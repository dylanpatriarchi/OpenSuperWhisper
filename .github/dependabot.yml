# https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference#package-ecosystem-

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "cargo"
    directory: "/tauri-app"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/tauri-app"
    schedule:
      interval: "weekly"
